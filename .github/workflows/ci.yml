name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Prisma lazy-init proxy requires some value to generate types; no real DB is hit
  DATABASE_URL: "postgresql://mock:mock@localhost:5432/mock"
  NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-anon-key"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run TypeScript check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production build
        run: npm run build

  audit-high:
    name: Audit High/Critical
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit high gate
        run: npm audit --audit-level=high

  e2e-storefront:
    name: E2E Storefront (producción, solo lectura)
    runs-on: ubuntu-latest
    # Solo corre si hay un slug de tienda de prueba configurado como repo variable.
    # No crea pedidos reales: E2E_CREATE_ORDERS queda sin definir, así que el test
    # de creación de pedido se omite. Únicamente valida GET tienda + rechazos 400.
    if: vars.E2E_STORE_SLUG != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Run storefront E2E against production
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://gesti-os.vercel.app' }}
          STORE_SLUG: ${{ vars.E2E_STORE_SLUG }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
